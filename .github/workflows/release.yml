# Maakt automatisch een tag + GitHub Release zodra de versie in
# onboardingchecklist/__init__.py omhoog gaat en je naar main pusht.
# De gebouwde wheel + sdist worden aan de release gehangen.

name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Auto Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lees versie + check of de tag al bestaat
        id: version
        run: |
          VERSION=$(grep -oE '__version__ = "[^"]+"' onboardingchecklist/__init__.py | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "exists=yes" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION bestaat al — geen nieuwe release."
          else
            echo "exists=no" >> "$GITHUB_OUTPUT"
            echo "Nieuwe versie: v$VERSION"
          fi

      - name: Set up Python
        if: steps.version.outputs.exists == 'no'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bouw wheel + sdist
        if: steps.version.outputs.exists == 'no'
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Maak tag + release
        if: steps.version.outputs.exists == 'no'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Onboarding Checklist ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
